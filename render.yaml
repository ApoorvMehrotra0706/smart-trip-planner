services:
  - type: web
    name: smart-trip-planner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.3
      - key: ALLOWED_ORIGINS
        sync: false
